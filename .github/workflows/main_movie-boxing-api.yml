name: Build and deploy Node.js project to Azure Function App - movie-boxing-api-flex

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './api' 
  NODE_VERSION: '22.x' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Resolve Project Dependencies'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm install
          npm run build --if-present
          popd

      # Zip the contents of the API folder specifically
      - name: Zip artifact for deployment
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          zip -r ../release.zip .
          popd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F04702CDE11144E9ACAC2993DE3C8736 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5D1E2BA210FC4A4F8CCA1F75F18E7B75 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8C04DF2A806B4E24A35EF1090C4F35C5 }}

      - name: 'Deploy to Azure Functions (Flex)'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'movie-boxing-api-flex'
          package: 'release.zip'
          # Flex Consumption requires these to be explicitly defined when using RBAC
          scm-do-build-during-deployment: false
          enable-oryx-build: false